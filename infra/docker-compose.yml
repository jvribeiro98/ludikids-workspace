# LudiKids - Docker Compose (dev e produção)
# Uso: docker compose -f infra/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ludikids-postgres
    environment:
      POSTGRES_USER: ludikids
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ludikids}
      POSTGRES_DB: ludikids
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludikids"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ludikids-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: ludikids-api
    environment:
      DATABASE_URL: postgresql://ludikids:${POSTGRES_PASSWORD:-ludikids}@postgres:5432/ludikids
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ludikids.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      BACKUP_DIR: /backups
    ports:
      - "4000:4000"
    volumes:
      - backup_volume:/backups
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: ludikids-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  backup_volume:
