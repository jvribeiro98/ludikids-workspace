# LudiKids - Stack completo para VPS (Postgres, Redis, API, Web, Caddy HTTPS)
# Uso (na raiz do repo): docker compose -f infra/docker-compose.full.yml up -d --build
# .env: APP_DOMAIN, CADDY_EMAIL, API_URL (ou NEXT_PUBLIC_API_URL), WEB_ORIGIN, JWT_*, etc.
# Externamente expostos apenas 80/443 (Caddy). API e Web só na rede interna.

networks:
  internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: ludikids-postgres
    networks: [internal]
    environment:
      POSTGRES_USER: ludikids
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ludikids}
      POSTGRES_DB: ludikids
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludikids"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ludikids-redis
    networks: [internal]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: ludikids-api
    networks: [internal]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ludikids:${POSTGRES_PASSWORD:-ludikids}@postgres:5432/ludikids
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      BACKUP_DIR: /backups
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ludikids.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - backups_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r)=>{ let d=''; r.on('data',c=>d+=c); r.on('end',()=>process.exit(r.statusCode===200?0:1)); }).on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: ludikids-web
    networks: [internal]
    environment:
      NODE_ENV: production
      API_URL: ${API_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: ludikids-caddy
    networks: [internal]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@ludikids.local}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backups_data:
  caddy_data:
  caddy_config:
